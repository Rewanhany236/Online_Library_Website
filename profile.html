<h1 class="profile-title">My Profile</h1>

<div class="profile-container">

    <div class="profile-card">

        <div class="profile-header">
            <div class="profile-avatar">👤</div>
            <h2 id="welcome-name"></h2>
        </div>

        <div class="profile-form">

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="p-username" class="form-control">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="p-email" class="form-control">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="p-password" class="form-control">
            </div>

            <div class="form-group">
                <label>User Type</label>
                <select id="p-type" class="form-control">
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <div class="profile-actions">
                <button onclick="updateProfile()" class="btn">Save Changes</button>
                <button onclick="logout()" class="btn">Logout</button>
            </div>

        </div>

    </div>

</div>
