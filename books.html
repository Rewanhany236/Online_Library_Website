<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <title>Books - Kitab Hub</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>

<body>

    <nav class="navbar">
        <div class="nav-right">
            <a href="books.html" class="logo-container">
                <img src="images/read.png" alt="library logo">
                 <span style="color: beige;" > Kitab Hub</span>
            </a>
        </div>

        <div class="nav-search">
            <input type="text" id="searchInput" placeholder="Search for a book or author">
            <button type="button" id="searchBtn">🔍</button>
        </div>

        <div class="nav-left">
            <a href="home.html">Home</a>
            <a href="books.html">Books</a>

            <span id="admin-links" style="display: none;">
                <a href="addbook.html">Add Book</a>
            </span>

            <span id="auth-links">
                <a href="signup.html">Sign Up</a>
                <a href="login.html">Login</a>
            </span>

            <span id="profile-links" style="display: none;">
                <a href="profile.html">Profile</a>
                <a href="login.html" id="logout-btn">Logout</a>
            </span>
        </div>
    </nav>

    <h1><center>Available Books</center></h1>

    <div class="books-container" id="booksContainer"></div>

    <!-- Scripts -->
    <script src="js/books-data.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/books.js"></script>
    <script>
        // Page-specific rendering logic (using functions from books.js)
        (function() {
            // Helper to get current user role (from books.js we could also export, but we read directly)
            function getCurrentUserRole() {
                const currentUser = JSON.parse(localStorage.getItem("currentUser"));
                return currentUser?.type || "guest";
            }

            let currentUserRole = getCurrentUserRole();

            function renderBooks(filterText = "") {
                const books = getBooks();  // from books.js
                const container = document.getElementById("booksContainer");
                if (!container) return;

                let filteredBooks = books;
                if (filterText.trim() !== "") {
                    const lowerFilter = filterText.toLowerCase();
                    filteredBooks = books.filter(book =>
                        book.title.toLowerCase().includes(lowerFilter) ||
                        book.author.toLowerCase().includes(lowerFilter)
                    );
                }

                if (filteredBooks.length === 0) {
                    container.innerHTML = '<p style="text-align:center;">No books available. <a href="addbook.html">Add one</a>.</p>';
                    return;
                }

                let html = "";
                filteredBooks.forEach(book => {
                    const status = book.status || "Available";
                    const statusClass = status.toLowerCase() === "available" ? "status-available" : "status-borrowed";

                    // Borrow button (visible only for regular users when available)
                    let borrowButton = "";
                    if (currentUserRole === "user" && status.toLowerCase() === "available") {
                        borrowButton = `<button class="user-only btn borrow-btn" data-id="${book.id}">Borrow</button>`;
                    }

                    // Admin buttons (Edit / Delete)
                    let adminButtons = "";
                    if (currentUserRole === "admin") {
                        adminButtons = `
                            <div class="admin-only">
                                <a href="editbook.html?id=${book.id}"><button class="btn edit-btn">Edit</button></a>
                                <button class="btn delete-btn" onclick="deleteBook(${book.id})">Delete</button>
                            </div>
                        `;
                    }

                    const imageUrl = book.imageUrl || "images/default-book.jpg";

                    html += `
                        <div class="book-card" data-id="${book.id}">
                            <a href="books-details.html?id=${book.id}">
                                <img src="${imageUrl}" alt="${book.title}" class="book-img" onerror="this.src='images/default-book.jpg'">
                            </a>
                            <h3>${escapeHtml(book.title)}</h3>
                            <p>By ${escapeHtml(book.author)}</p>
                            <p class="status ${statusClass}">${status}</p>
                            <div class="actions">
                                ${borrowButton}
                                ${adminButtons}
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = html;

                // Attach borrow event listeners (since borrow buttons are dynamic)
                document.querySelectorAll(".borrow-btn").forEach(btn => {
                    btn.addEventListener("click", (e) => {
                        e.preventDefault();
                        const bookId = parseInt(btn.getAttribute("data-id"));
                        borrowBook(bookId);  // from books.js
                        // After borrowing, re-render to update status and button visibility
                        setTimeout(() => renderBooks(document.getElementById("searchInput").value), 100);
                    });
                });
            }

            // Initialize: seed localStorage if needed, then render
            initLocalStorage();  // from books.js
            renderBooks();

            // Search functionality
            const searchInput = document.getElementById("searchInput");
            const searchBtn = document.getElementById("searchBtn");
            if (searchBtn && searchInput) {
                searchBtn.addEventListener("click", () => renderBooks(searchInput.value));
                searchInput.addEventListener("keyup", (e) => {
                    if (e.key === "Enter") renderBooks(searchInput.value);
                });
            }

            // Re-run role-based visibility after any change (e.g., login/logout)
            // The nav.js already handles navbar; we need to refresh the book cards when role changes
            // For simplicity, we listen for storage events (if another tab changes role)
            window.addEventListener("storage", () => {
                currentUserRole = getCurrentUserRole();
                renderBooks(searchInput ? searchInput.value : "");
            });
        })();
    </script>
</body>

</html>
