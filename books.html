<!DOCTYPE html>
<html lang="ar">

<head>

<body>

    <nav class="navbar">
        <div class="nav-right">
            <a href="books.html" class="logo-container">
                <img src="images/read.png" alt="لوجو المكتبة">
                <span> Kitab Hub </span>
            </a>
        </div>

        <div class="nav-search">
            <input type="text" placeholder="ابحث عن كتاب أو مؤلف...">

        </div>

    <h1>
        <center>Available Books</center>
    </h1>

    <div class="books-container">
        
        <div class="book-card">
            <a href="books-details.html?id=1">
                <img src="images/clean-code.jpg" alt="Clean Code" class="book-img">
            </a>
            <h3>Clean Code</h3>
            <p>By Robert Martin</p>
            <p class="status">Available</p>
            <div class="actions">
                <button class="user-only btn" style="display: none;">Borrow</button>
                
                <div class="admin-only" style="display: none;">
                    <a href="editbook.html?id=1"><button class="btn edit-btn">Edit</button></a>
                    <button class="btn delete-btn" onclick="deleteBook(1)">Delete</button>
                </div>
            </div>
        </div>

            <p>By Roald Dahl</p>
