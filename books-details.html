<!DOCTYPE html>
<html>
<head>
    <title>Book Details</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-right">
        <a href="books.html" class="logo-container">
            <img src="images/read.png" alt="لوجو المكتبة">
            <span>Kitab Hub</span>
        </a>
    </div>

    <div class="nav-left">
        <a href="home.html">Home</a>
        <a href="books.html">Books</a>

        <span id="guest-links">
            <a href="signup.html">Sign Up</a>
            <a href="login.html">Login</a>
        </span>

        <span id="user-links" style="display: none;">
            <a href="profile.html">Profile</a>
            <a href="#" id="logout-btn">Logout</a>
        </span>
    </div>
</nav>

<div id="book-details">
    <p>Loading book details...</p>
</div>

<script src="../js/books-data.js"></script>
<script>
    function initLocalStorage() {
        if (!localStorage.getItem('books')) {
            if (typeof books !== 'undefined' && Array.isArray(books)) {
                localStorage.setItem('books', JSON.stringify(books));
            } else {
                localStorage.setItem('books', JSON.stringify([]));
            }
        }
    }

    function getBooks() {
        return JSON.parse(localStorage.getItem('books')) || [];
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function updateNavbar() {
        const userRole = localStorage.getItem('userRole');
        const guestLinks = document.getElementById('guest-links');
        const userLinks = document.getElementById('user-links');

        if (userRole === 'admin' || userRole === 'user') {
            if (guestLinks) guestLinks.style.display = 'none';
            if (userLinks) userLinks.style.display = 'inline';
        } else {
            if (guestLinks) guestLinks.style.display = 'inline';
            if (userLinks) userLinks.style.display = 'none';
        }
    }

    function logout() {
        localStorage.removeItem('currentUser');
        localStorage.removeItem('userRole');
        window.location.href = 'login.html';
    }

    const urlParams = new URLSearchParams(window.location.search);
    const bookId = urlParams.get('id');
    const detailsContainer = document.getElementById('book-details');

    initLocalStorage();
    const booksArray = getBooks();
    const book = booksArray.find(b => b.id == bookId);

    if (!book) {
        detailsContainer.innerHTML = '<p style="color: red;">Book not found. Please go back and try again.</p>';
    } else {
        let detailsHTML = `
            <div class="book-detail-layout">
                <div class="book-image-area">
                    ${book.imageUrl ? `<img src="${book.imageUrl}" alt="${book.title} cover" class="book-cover">` : '<div class="no-image">No image available</div>'}
                </div>
                <div class="book-info-area">
                    <h2>${escapeHtml(book.title)}</h2>
                    <p><strong>Author:</strong> ${escapeHtml(book.author)}</p>
                    <p><strong>Category:</strong> ${escapeHtml(book.category || '—')}</p>
                    <p><strong>Status:</strong> ${escapeHtml(book.status || 'Available')}</p>
                    <p><strong>Description:</strong> ${escapeHtml(book.description || 'No description available.')}</p>
                    ${book.authorWikipedia ? `<p><strong>More about the author:</strong> <a href="${escapeHtml(book.authorWikipedia)}" target="_blank">Wikipedia</a></p>` : ''}
                </div>
            </div>
        `;
        detailsContainer.innerHTML = detailsHTML;
    }

    updateNavbar();
    const logoutBtn = document.getElementById('logout-btn');
    if (logoutBtn) {
        logoutBtn.addEventListener('click', function(e) {
            e.preventDefault();
            logout();
        });
    }
</script>
</body>
</html>
