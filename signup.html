<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Online Library | Sign Up</title>

</head>

<body>


<nav class="navbar">
    <a href="home.html" class="nav-logo">Library</a>

    <ul class="nav-links">
        <li><a href="home.html">Home</a></li>
        <li><a href="books.html">Books</a></li>
        <li><a href="borrowed-books.html">Borrowed Books</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="signup.html">Sign Up</a></li>
    </ul>
</nav>


<h1 class="signup-title">Create an Account</h1>
<p class="signup-subtitle">Please fill the form to register.</p>


<form class="signup-form" onsubmit="return validateSignup()">

    <label>Username:</label>
    <input type="text" id="username" placeholder="Enter your username" required>

    <label>Email:</label>
    <input type="email" id="email" placeholder="Enter your email" required>

    <label>Password:</label>
    <input type="password" id="password" placeholder="Enter password" required>

    <label>Confirm Password:</label>
    <input type="password" id="confirm" placeholder="Confirm password" required>

    <label>User Type:</label>
    <select id="type" required>
        <option value="">Select</option>
        <option value="user">User</option>
        <option value="admin">Admin</option>
    </select>

    <button type="submit" class="signup-btn">Register</button>

    <div class="signup-login-link">
        Already have an account?
        <a href="login.html">Login</a>
    </div>

</form>


<script src="script.js"></script>

</body>

</html>
